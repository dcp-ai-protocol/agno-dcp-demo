# fly.toml app configuration file generated for agno-dcp-demo on 2026-05-01T22:27:10-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agno-dcp-demo'
primary_region = 'gru'

[build]
  dockerfile = '../docker/Dockerfile'

[env]
  APP_HOST = '0.0.0.0'
  APP_LOG_LEVEL = 'INFO'
  APP_PORT = '8000'
  DCP_DB_PATH = '/app/data/agent.db'
  DEMO_BANK_NAME = 'Demo Trust Bank'
  DEMO_HUMAN_PRINCIPAL = 'ops@demo-trust-bank.example'
  LLM_PROVIDER = 'mock'

[[mounts]]
  source = 'agno_dcp_data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
